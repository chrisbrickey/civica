services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: civica-postgres
    environment:
      POSTGRES_USER: civica
      POSTGRES_PASSWORD: civica
      POSTGRES_DB: civica
    ports:
      - "5432:5432"
    volumes:
      - civica_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civica -d civica"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  civica_postgres_data:
